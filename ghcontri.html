<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>GitHub Contributions</title>
        <style>
            :root {
                --bg: #0d1117;
                --bg-card: #161b22;
                --bg-badge: #21262d;
                --border: #30363d;
                --text-primary: #e6edf3;
                --text-secondary: #8b949e;
                --accent: #58a6ff;
                --accent-hover: #79b8ff;
                --danger: #f85149;
                --contrib-none: #161b22;
                --contrib-q1: #0e4429;
                --contrib-q2: #006d32;
                --contrib-q3: #26a641;
                --contrib-q4: #39d353;
            }
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                background: var(--bg);
                color: var(--text-primary);
                padding: 24px;
            }
            h1 {
                font-size: 22px;
                margin-bottom: 4px;
            }
            .subtitle {
                color: var(--text-secondary);
                font-size: 13px;
                margin-bottom: 24px;
            }
            .config {
                display: flex;
                flex-direction: column;
                gap: 12px;
                margin-bottom: 24px;
            }
            .row {
                display: flex;
                gap: 8px;
                align-items: center;
                flex-wrap: wrap;
            }
            label {
                font-size: 13px;
                color: var(--text-secondary);
                min-width: 50px;
            }
            input {
                padding: 8px 12px;
                border-radius: 8px;
                border: 1px solid var(--border);
                background: var(--bg-card);
                color: var(--text-primary);
                font-size: 14px;
                outline: none;
            }
            input:focus {
                border-color: var(--accent);
            }
            input[type="date"] {
                width: 150px;
            }
            input[type="date"]::-webkit-calendar-picker-indicator {
                filter: invert(0.7);
            }
            .pat-wrap {
                position: relative;
                flex: 1;
                min-width: 200px;
            }
            .pat-wrap input {
                width: 100%;
                padding-right: 50px;
            }
            .pat-toggle {
                position: absolute;
                right: 8px;
                top: 50%;
                transform: translateY(-50%);
                background: none;
                border: none;
                color: var(--text-secondary);
                cursor: pointer;
                font-size: 12px;
            }
            .btn {
                padding: 8px 18px;
                border-radius: 8px;
                border: none;
                cursor: pointer;
                font-weight: 600;
                font-size: 14px;
                transition: opacity 0.15s;
            }
            .btn:hover {
                opacity: 0.85;
            }
            .btn-primary {
                background: var(--accent);
                color: #fff;
            }
            .btn-secondary {
                background: var(--bg-badge);
                color: var(--text-primary);
            }
            .btn:disabled {
                opacity: 0.4;
                cursor: not-allowed;
            }
            .chips {
                display: flex;
                gap: 6px;
                flex-wrap: wrap;
                margin-left: 58px;
            }
            .chip {
                display: inline-flex;
                align-items: center;
                gap: 6px;
                padding: 4px 12px;
                border-radius: 20px;
                background: var(--bg-badge);
                font-size: 13px;
            }
            .chip button {
                background: none;
                border: none;
                color: var(--text-secondary);
                cursor: pointer;
                font-size: 16px;
                line-height: 1;
                padding: 0;
            }
            .chip button:hover {
                color: var(--danger);
            }
            .grid {
                display: grid;
                gap: 16px;
            }
            .card {
                background: var(--bg-card);
                border-radius: 12px;
                padding: 16px 20px;
                border: 1px solid var(--border);
            }
            .card-header {
                display: flex;
                align-items: center;
                gap: 10px;
                margin-bottom: 12px;
            }
            .card-header img {
                width: 32px;
                height: 32px;
                border-radius: 50%;
            }
            .card-header .avatar-placeholder {
                width: 32px;
                height: 32px;
                border-radius: 50%;
                background: var(--bg-badge);
            }
            .card-header .name {
                font-weight: 600;
                font-size: 15px;
            }
            .card-header .total {
                color: var(--text-secondary);
                font-size: 12px;
                margin-left: 8px;
            }
            .heatmap-wrap {
                overflow-x: auto;
                margin-bottom: 14px;
            }
            .stats {
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
                justify-content: center;
            }
            .stat {
                display: flex;
                flex-direction: column;
                align-items: center;
                padding: 8px 14px;
                border-radius: 8px;
                background: var(--bg-badge);
                min-width: 70px;
            }
            .stat-value {
                font-size: 20px;
                font-weight: 700;
            }
            .stat-label {
                font-size: 11px;
                color: var(--text-secondary);
                margin-top: 2px;
            }
            .error {
                color: var(--danger);
                font-size: 13px;
                padding: 12px 0;
            }
            .loading {
                color: var(--text-secondary);
                font-size: 13px;
                padding: 30px 0;
                text-align: center;
            }
        </style>
    </head>
    <body>
        <h1>GitHub Contributions</h1>
        <p class="subtitle">
            View contribution heatmaps and stats filtered by organization.
        </p>

        <div class="config">
            <div class="row">
                <label>PAT</label>
                <div class="pat-wrap">
                    <input id="pat" type="password" placeholder="ghp_..." />
                    <button class="pat-toggle" onclick="togglePat()">
                        Show
                    </button>
                </div>
            </div>
            <div class="row">
                <label>Org</label>
                <input
                    id="org"
                    value="allyoucanlearn"
                    placeholder="Optional"
                    style="width: 160px"
                />
                <label style="margin-left: 8px">From</label>
                <input id="from" type="date" />
                <label>To</label>
                <input id="to" type="date" />
            </div>
            <div class="row">
                <label>Users</label>
                <input
                    id="userInput"
                    placeholder="Add username..."
                    style="width: 160px"
                    onkeydown="if (event.key === 'Enter') addUser();"
                />
                <button class="btn btn-secondary" onclick="addUser()">
                    Add
                </button>
            </div>
            <div class="chips" id="chips"></div>
            <button
                class="btn btn-primary"
                id="fetchBtn"
                style="margin-left: 58px; align-self: flex-start"
                onclick="fetchAll()"
            >
                Fetch Contributions
            </button>
        </div>

        <div class="grid" id="grid"></div>

        <script>
            const LEVELS = {
                NONE: "var(--contrib-none)",
                FIRST_QUARTILE: "var(--contrib-q1)",
                SECOND_QUARTILE: "var(--contrib-q2)",
                THIRD_QUARTILE: "var(--contrib-q3)",
                FOURTH_QUARTILE: "var(--contrib-q4)",
            };

            const QUERY_ORG = `query($org:String!){organization(login:$org){id name}}`;
            const QUERY = `query($user:String!,$orgId:ID,$from:DateTime!,$to:DateTime!){
  user(login:$user){avatarUrl contributionsCollection(organizationID:$orgId,from:$from,to:$to){
    totalCommitContributions totalPullRequestContributions totalPullRequestReviewContributions
    totalIssueContributions totalRepositoryContributions
    contributionCalendar{totalContributions weeks{contributionDays{date contributionCount contributionLevel weekday}}}
  }}
}`;

            let users = ["brdv", "mooya", "reinand", "mathijsr94", "diondb"];

            // Set default dates
            const now = new Date();
            const yearAgo = new Date();
            yearAgo.setFullYear(now.getFullYear() - 1);
            document.getElementById("from").value = yearAgo
                .toISOString()
                .split("T")[0];
            document.getElementById("to").value = now
                .toISOString()
                .split("T")[0];
            renderChips();

            function togglePat() {
                const inp = document.getElementById("pat");
                const btn = inp.nextElementSibling;
                inp.type = inp.type === "password" ? "text" : "password";
                btn.textContent = inp.type === "password" ? "Show" : "Hide";
            }

            function addUser() {
                const inp = document.getElementById("userInput");
                const u = inp.value.trim().toLowerCase();
                if (u && !users.includes(u)) {
                    users.push(u);
                    renderChips();
                }
                inp.value = "";
            }

            function removeUser(u) {
                users = users.filter((x) => x !== u);
                renderChips();
            }

            function renderChips() {
                document.getElementById("chips").innerHTML = users
                    .map(
                        (u) =>
                            `<span class="chip">${u}<button onclick="removeUser('${u}')">×</button></span>`,
                    )
                    .join("");
            }

            async function gql(token, query, vars) {
                const res = await fetch("https://api.github.com/graphql", {
                    method: "POST",
                    headers: {
                        Authorization: `bearer ${token}`,
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({ query, variables: vars }),
                });
                if (!res.ok)
                    throw new Error(
                        `HTTP ${res.status}: ${(await res.text()).slice(0, 200)}`,
                    );
                const json = await res.json();
                if (json.errors)
                    throw new Error(
                        json.errors.map((e) => e.message).join(", "),
                    );
                return json.data;
            }

            function buildHeatmap(weeks) {
                const cw = 13,
                    ch = 13,
                    gap = 3,
                    labelW = 28;
                const w = labelW + weeks.length * (cw + gap);
                const h = 7 * (ch + gap) + 20;
                const dayLabels = ["", "Mon", "", "Wed", "", "Fri", ""];
                let svg = `<svg width="100%" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">`;

                // Month labels
                let lastMonth = "";
                weeks.forEach((week, wi) => {
                    const d = new Date(week.contributionDays[0].date);
                    const m = d.toLocaleString("en", { month: "short" });
                    if (m !== lastMonth) {
                        svg += `<text x="${labelW + wi * (cw + gap)}" y="10" font-size="10" fill="var(--text-secondary)">${m}</text>`;
                        lastMonth = m;
                    }
                });

                // Day labels
                dayLabels.forEach((l, i) => {
                    if (l)
                        svg += `<text x="0" y="${18 + i * (ch + gap) + ch - 2}" font-size="9" fill="var(--text-secondary)">${l}</text>`;
                });

                // Cells
                weeks.forEach((week, wi) => {
                    week.contributionDays.forEach((day, di) => {
                        svg += `<rect x="${labelW + wi * (cw + gap)}" y="${16 + di * (ch + gap)}" width="${cw}" height="${ch}" rx="2" fill="${LEVELS[day.contributionLevel] || LEVELS.NONE}"><title>${day.date}: ${day.contributionCount} contributions</title></rect>`;
                    });
                });

                svg += "</svg>";
                return svg;
            }

            function renderCard(username, state) {
                const header = (avatar) => `
    <div class="card-header">
      ${avatar ? `<img src="${avatar}" alt="">` : '<div class="avatar-placeholder"></div>'}
      <div><span class="name">${username}</span>${state.total != null ? `<span class="total">${state.total} contributions</span>` : ""}</div>
    </div>`;

                if (state.loading)
                    return (
                        '<div class="card">' +
                        header() +
                        '<div class="loading">Loading...</div></div>'
                    );
                if (state.error)
                    return (
                        '<div class="card">' +
                        header() +
                        '<div class="error">' +
                        state.error +
                        "</div></div>"
                    );

                var c = state.data.contributionsCollection;
                var cal = c.contributionCalendar;
                var html = '<div class="card">';
                html += header(state.data.avatarUrl);
                html +=
                    '<div class="heatmap-wrap">' +
                    buildHeatmap(cal.weeks) +
                    "</div>";
                html += '<div class="stats">';
                html +=
                    '<div class="stat"><span class="stat-value">' +
                    c.totalCommitContributions +
                    '</span><span class="stat-label">Commits</span></div>';
                html +=
                    '<div class="stat"><span class="stat-value">' +
                    c.totalPullRequestContributions +
                    '</span><span class="stat-label">PRs</span></div>';
                html +=
                    '<div class="stat"><span class="stat-value">' +
                    c.totalPullRequestReviewContributions +
                    '</span><span class="stat-label">Reviews</span></div>';
                html +=
                    '<div class="stat"><span class="stat-value">' +
                    c.totalIssueContributions +
                    '</span><span class="stat-label">Issues</span></div>';
                html +=
                    '<div class="stat"><span class="stat-value">' +
                    c.totalRepositoryContributions +
                    '</span><span class="stat-label">Repos</span></div>';
                html += "</div></div>";
                return html;
            }

            function updateGrid(results) {
                const cols = Math.min(users.length, 3);
                const grid = document.getElementById("grid");
                grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
                grid.innerHTML = users
                    .map((u) => renderCard(u, results[u] || {}))
                    .join("");
            }

            async function fetchAll() {
                const token = document.getElementById("pat").value.trim();
                const org = document.getElementById("org").value.trim();
                const from = new Date(
                    document.getElementById("from").value,
                ).toISOString();
                const to = new Date(
                    document.getElementById("to").value,
                ).toISOString();

                if (!token || !users.length) return;

                const btn = document.getElementById("fetchBtn");
                btn.disabled = true;
                btn.textContent = "Fetching...";

                const results = {};
                users.forEach((u) => (results[u] = { loading: true }));
                updateGrid(results);

                // Resolve org ID
                let orgId = null;
                if (org) {
                    try {
                        const d = await gql(token, QUERY_ORG, { org });
                        orgId = d.organization?.id || null;
                    } catch {
                        orgId = null;
                    }
                }

                // Fetch all users in parallel
                await Promise.all(
                    users.map(async (user) => {
                        try {
                            const d = await gql(token, QUERY, {
                                user,
                                orgId,
                                from,
                                to,
                            });
                            results[user] = { data: d.user };
                        } catch (e) {
                            results[user] = { error: e.message };
                        }
                        updateGrid(results);
                    }),
                );

                btn.disabled = false;
                btn.textContent = "Fetch Contributions";
            }
        </script>
    </body>
</html>
